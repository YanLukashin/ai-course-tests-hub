name: Deploy Tests Hub to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-tests-pages.yml"
      - "Платформа курса ИИ/**"
      - "Модуль 1/Module-1-Test-Final.md"
      - "Модуль 2/Test-Module-2.md"
      - "Модуль 3/Module-3-Test-Ready.md"
      - "Модуль 4/Module-4-Test-Final.md"
      - "Модуль 5/Test-Module-5-NoCode-Automation.md"
      - "Модуль 6/Module-6-Test-Ready.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild course data
        working-directory: "./Платформа курса ИИ"
        run: node scripts/build-course-data.mjs

      - name: Add Pages marker
        run: touch "./Платформа курса ИИ/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./Платформа курса ИИ"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
